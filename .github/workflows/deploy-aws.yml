name: Build and Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build and only redeploy (use existing images)'
        required: false
        default: 'false'

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'ap-south-1' }}.amazonaws.com

jobs:
  # ── Build & Push Docker images to ECR ──────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repositories if missing
        run: |
          for repo in realmoney-backend realmoney-frontend; do
            aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" 2>/dev/null \
              || aws ecr create-repository --repository-name "$repo" --region "$AWS_REGION" \
                   --image-scanning-configuration scanOnPush=true \
                   --image-tag-mutability MUTABLE
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: platform/backend
          file: platform/backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/realmoney-backend:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/realmoney-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: platform/frontend
          file: platform/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/realmoney-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/realmoney-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Deploy to EC2 ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.event.inputs.skip_build }}" = "true" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          envs: ECR_REGISTRY,AWS_REGION
          script: |
            set -euo pipefail

            export ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
            export APP_VERSION="${{ steps.meta.outputs.tag }}"
            export AWS_REGION="${{ env.AWS_REGION }}"

            cd /opt/realmoney

            echo "==> Pulling latest code"
            git pull --ff-only

            echo "==> Logging in to ECR"
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            echo "==> Pulling new images (tag: $APP_VERSION)"
            cd /opt/realmoney/platform
            ECR_REGISTRY="$ECR_REGISTRY" APP_VERSION="$APP_VERSION" \
              docker compose -f docker-compose.prod.yml pull backend frontend

            echo "==> Rolling update"
            ECR_REGISTRY="$ECR_REGISTRY" APP_VERSION="$APP_VERSION" \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Waiting for health checks (max 90s)"
            for i in $(seq 1 18); do
              sleep 5
              status=$(docker inspect --format='{{.State.Health.Status}}' \
                $(docker compose -f docker-compose.prod.yml ps -q backend) 2>/dev/null || echo "unknown")
              echo "   backend: $status (${i}/18)"
              [ "$status" = "healthy" ] && break
              if [ "$i" -eq 18 ]; then
                echo "ERROR: backend did not become healthy"
                docker compose -f docker-compose.prod.yml logs --tail=60 backend
                exit 1
              fi
            done

            echo "==> Pruning old images"
            docker image prune -f --filter "until=24h"

            echo "Deploy successful: $APP_VERSION"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            curl -sf http://localhost/api/health | jq . || \
              (echo "Health check failed!" && exit 1)
