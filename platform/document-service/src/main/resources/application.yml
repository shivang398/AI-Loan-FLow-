server:
  port: ${PORT:8080}
spring:
  application:
    name: document-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/platform_document
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
aws:
  access-key: ${AWS_ACCESS_KEY:changeme}
  secret-key: ${AWS_SECRET_KEY:changeme}
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${AWS_S3_BUCKET:platform-documents-dev}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
