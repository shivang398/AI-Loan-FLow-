name: realmoney-platform

services:

  # ── Message Broker ──────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Cache ───────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend (Node.js / Express — replaces 6 Spring Boot services) ────────────
  #
  # Single Node.js process handles all API routes, connected to 6 MySQL databases
  # via 6 separate Prisma clients. WebSocket (Socket.IO) is served on the same port.
  # Health endpoint: GET /health

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: realmoney/backend:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "8080"
      NODE_ENV: production
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      RABBITMQ_EXCHANGE: platform.exchange
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M

  # ── Frontend (Nginx reverse proxy + React SPA) ──────────────────────────────
  #
  # The nginx.conf.template inside the frontend image routes each /api/<prefix>
  # to the correct backend container. SERVICE_DISCOVERY_SUFFIX="" disables AWS
  # Cloud Map discovery and uses Docker container names directly.
  #
  # Logical name → merged container mapping:
  #   connector / commission / routing → sales-ops-service
  #   customer / document             → customer-document-service
  #   loan / eligibility / policy     → loan-core-service
  #   messaging                       → communications-service
  #   reporting / analytics           → analytics-reporting-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: realmoney/frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:8080"
    environment:
      PORT: "8080"
      SERVICE_DISCOVERY_SUFFIX: ""
      AUTH_SERVICE_URL: "backend:8080"
      CONNECTOR_SERVICE_URL: "backend:8080"
      COMMISSION_SERVICE_URL: "backend:8080"
      ROUTING_SERVICE_URL: "backend:8080"
      CUSTOMER_SERVICE_URL: "backend:8080"
      DOCUMENT_SERVICE_URL: "backend:8080"
      LOAN_SERVICE_URL: "backend:8080"
      ELIGIBILITY_SERVICE_URL: "backend:8080"
      POLICY_SERVICE_URL: "backend:8080"
      MESSAGING_SERVICE_URL: "backend:8080"
      REPORTING_SERVICE_URL: "backend:8080"
      ANALYTICS_SERVICE_URL: "backend:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  rabbitmq_data:
  redis_data:

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  platform-net:
    driver: bridge
