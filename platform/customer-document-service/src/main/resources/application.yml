server:
  port: ${PORT:8083}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  main:
    lazy-initialization: true
  application:
    name: customer-document-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/platform_customer_docs?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    connection-timeout: 1000
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

aws:
  access-key: ${AWS_ACCESS_KEY:changeme}
  secret-key: ${AWS_SECRET_KEY:changeme}
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${AWS_S3_BUCKET:platform-documents-dev}

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
  rabbitmq:
    exchange: platform.exchange
  ops:
    team-emails: ${OPS_TEAM_EMAILS:manas.pareek@realmoneygroups.in}

management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Fix 2: 32-char AES-256 key for PAN/Aadhaar encryption — set via env var in production
# Generate with: openssl rand -hex 16
# PII_ENCRYPTION_KEY is read directly from env by EncryptedStringConverter (not Spring)
