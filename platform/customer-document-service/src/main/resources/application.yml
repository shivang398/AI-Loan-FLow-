server:
  port: ${PORT:8083}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: customer-document-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/platform_customer_docs
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    connection-timeout: 1000
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

aws:
  access-key: ${AWS_ACCESS_KEY:changeme}
  secret-key: ${AWS_SECRET_KEY:changeme}
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${AWS_S3_BUCKET:platform-documents-dev}

app:
  jwt:
    secret: ${JWT_SECRET}
  rabbitmq:
    exchange: platform.exchange
  ops:
    team-emails: ${OPS_TEAM_EMAILS:manas.pareek@realmoneygroups.in}

management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
