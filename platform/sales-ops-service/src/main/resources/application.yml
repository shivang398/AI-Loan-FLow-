server:
  port: ${PORT:8082}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  main:
    lazy-initialization: true
  application:
    name: sales-ops-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/platform_sales_ops?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    connection-timeout: 1000
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-local}
  rabbitmq:
    exchange: platform.exchange

management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# FOIR eligibility configuration — all values runtime-overridable via env vars.
# Override example: FOIR_PERSONAL-LOAN_LIMIT-PERCENTAGE=55.0
foir:
  personal-loan:
    limit-percentage: ${FOIR_LIMIT_PCT:50.0}
    min-income: ${FOIR_MIN_INCOME:15000}
    max-tenure-months: ${FOIR_MAX_TENURE:84}
    default-annual-interest-rate: ${FOIR_DEFAULT_RATE:12.0}
