server:
  port: ${PORT:8084}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: loan-core-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/platform_loan_core
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

tenacio:
  api:
    url: ${TENACIO_API_URL:https://api.tenacio.io/api/v1/services/cibil-soft-pull}
    client-id: ${TENACIO_CLIENT_ID:realf_96900}
    key: ${TENACIO_API_KEY:tnc_prod_3b9b4ff8ed9}
    workflow-id: ${TENACIO_WORKFLOW_ID:5d2e9c46-68e4-4d6e-a52e-b1287a63e80b}

app:
  jwt:
    secret: ${JWT_SECRET}
  rabbitmq:
    exchange: platform.exchange

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
