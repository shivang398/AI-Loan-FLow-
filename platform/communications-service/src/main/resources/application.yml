server:
  port: ${PORT:8087}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  main:
    lazy-initialization: false
  application:
    name: communications-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/platform_communications?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=${DB_USE_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
      direct: {}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}
  cloud:
    aws:
      s3:
        endpoint: ${AWS_S3_ENDPOINT:https://s3.ap-south-1.amazonaws.com}
        region: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
  rabbitmq:
    exchange: platform.exchange
  whatsapp:
    api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v19.0}
    phone-number-id: ${WHATSAPP_PHONE_ID:}
    access-token: ${WHATSAPP_TOKEN:}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:}
    app-secret: ${WHATSAPP_APP_SECRET:}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    com.financial: ${LOG_LEVEL:INFO}

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
