# Railway Configuration for Frontend Service
# Location: platform/frontend/railway.toml

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 10
restartPolicyType = "always"
restartPolicyMaxRetries = 5

# Environment variables for backend service URLs (optional - defaults to Railway internal hostnames)
# Override these if backend services are in different Railway projects or have different naming
# [env]
# AUTH_SERVICE_URL = "auth-service.railway.internal:8080"
# CUSTOMER_SERVICE_URL = "customer-service.railway.internal:8080"
# ... etc.
