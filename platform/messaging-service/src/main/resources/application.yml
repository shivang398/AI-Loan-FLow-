spring:
  application:
    name: messaging-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/platform_messaging
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    aws:
      s3:
        endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
        region: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY:test}
        secret-key: ${AWS_SECRET_KEY:test}

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  whatsapp:
    api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v19.0}
    phone-number-id: ${WHATSAPP_PHONE_ID:123456789}
    access-token: ${WHATSAPP_TOKEN:EAAG...}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:my_secure_token}
    app-secret: ${WHATSAPP_APP_SECRET:my_app_secret}

logging:
  level:
    com.financial: ${LOG_LEVEL:DEBUG}
