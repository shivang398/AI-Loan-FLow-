spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 25
app:
  jwt:
    secret: TestSecretKeyForUnitTestsMustBe32Plus!
    expiration: 86400000
  rabbitmq:
    exchange: platform.exchange
  whatsapp:
    phone-number-id: test
    access-token: test
    verify-token: test
    app-secret: test
tenacio:
  api:
    url: http://localhost
    client-id: test
    key: test
    workflow-id: test
management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
    mail:
      enabled: false
logging:
  level:
    root: WARN
    com.financial: WARN
