# Production Docker Compose — EC2 deployment
# Uses RDS for MySQL and real AWS S3. No LocalStack. No exposed internal ports.
#
# Prerequisites:
#   platform/.env.production must exist (copy from .env.production.example and fill in values)
#
# Usage:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#   docker compose --env-file .env.production -f docker-compose.prod.yml ps
#   docker compose --env-file .env.production -f docker-compose.prod.yml logs -f backend

name: realmoney-prod

services:

  # ── Message Broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    environment:
      # ${RABBITMQ_USER} and ${RABBITMQ_PASS} are interpolated from .env.production
      # via --env-file flag on the docker compose command
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required in .env.production}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required in .env.production}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env.production} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    image: ${ECR_REGISTRY:-realmoney}/backend:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Single source of truth — all runtime config comes from .env.production.
    # No second env_file, no environment: overrides needed.
    env_file: .env.production
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - platform-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M

  # ── Frontend (Nginx + React SPA) ────────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY:-realmoney}/frontend:${APP_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      PORT: "8080"
      HTTPS_PORT: "8443"
      # ${DOMAIN} is interpolated from .env.production via --env-file flag
      DOMAIN: "${DOMAIN:-localhost}"
      SERVICE_DISCOVERY_SUFFIX: ""
      # Docker-internal service hostnames — all services run as "backend" on platform-net
      AUTH_SERVICE_URL: "backend:8080"
      CONNECTOR_SERVICE_URL: "backend:8080"
      COMMISSION_SERVICE_URL: "backend:8080"
      ROUTING_SERVICE_URL: "backend:8080"
      CUSTOMER_SERVICE_URL: "backend:8080"
      DOCUMENT_SERVICE_URL: "backend:8080"
      LOAN_SERVICE_URL: "backend:8080"
      ELIGIBILITY_SERVICE_URL: "backend:8080"
      POLICY_SERVICE_URL: "backend:8080"
      MESSAGING_SERVICE_URL: "backend:8080"
      REPORTING_SERVICE_URL: "backend:8080"
      ANALYTICS_SERVICE_URL: "backend:8080"
      NAMESERVER: "127.0.0.11"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost:8443/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - platform-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  rabbitmq_data:
  redis_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  platform-net:
    driver: bridge
