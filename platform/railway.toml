# Railway Configuration for Java Microservices
# This is a template/default config. Each service will override as needed.
#
# For Railway Dashboard:
# - Each Java service should be configured with:
#   - Root Directory: platform
#   - Dockerfile Path: Dockerfile
#   - Build Args: SERVICE_NAME=<service-name>
#   - Environment Variables: (see RAILWAY_DEPLOY.md)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildArgs = { SERVICE_NAME = "${{SERVICE_NAME}}" }

[deploy]
startCommand = "java -jar app.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "always"
restartPolicyMaxRetries = 5
