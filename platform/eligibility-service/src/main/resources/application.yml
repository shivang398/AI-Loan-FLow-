server:
  port: ${PORT:8080}

spring:
  application:
    name: eligibility-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/platform_eligibility
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

tenacio:
