server:
  port: ${PORT:8085}

spring:
  application:
    name: eligibility-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/platform_eligibility
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 2
    validate-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

tenacio:
  api:
    url: ${TENACIO_API_URL:https://api.tenacio.io/api/v1/services/cibil-soft-pull}
    client-id: ${TENACIO_CLIENT_ID:realf_96900}
    key: ${TENACIO_API_KEY:tnc_prod_3b9b4ff8ed9}
    workflow-id: ${TENACIO_WORKFLOW_ID:5d2e9c46-68e4-4d6e-a52e-b1287a63e80b}

app:
  jwt:
    secret: ${JWT_SECRET}
