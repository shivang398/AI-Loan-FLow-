server:
  port: ${PORT:8081}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/platform_auth
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRY_MS:28800000}
  rabbitmq:
    exchange: platform.exchange

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
