server:
  port: ${PORT:8081}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  threads:
    virtual:
      enabled: true
  main:
    lazy-initialization: true
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/platform_auth?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRY_MS:28800000}
  rabbitmq:
    exchange: platform.exchange

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# A05: CORS — override via env var in production (e.g. https://app.realmoney.in)
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
